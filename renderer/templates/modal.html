{{ define "component.modal" }}
<div id="{{ .ID }}" class="a2ui-modal {{ .Class }}">
  {{ if .Modal }}
  <details class="a2ui-modal__details">
    <summary class="a2ui-modal__trigger">{{ .Modal.EntryPointHTML }}</summary>
    <div class="a2ui-modal__content">{{ .Modal.ContentHTML }}</div>
  </details>
  {{ end }}
</div>
{{ end }}
